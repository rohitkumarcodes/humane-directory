<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1.0">
  <title>humane.directory Open Graph Image</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #fff;
      color: #111;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      position: relative;
      padding: 56px 72px 44px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
    }

    .brand img {
      width: 108px;
      height: 81px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 92px;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0 0 22px;
      font-size: 36px;
      line-height: 1.25;
      color: #5a5a5a;
    }

    ul {
      margin: 0 0 0 38px;
      padding: 0;
      font-size: 31px;
      line-height: 1.45;
    }

    li + li {
      margin-top: 12px;
    }

    .rule {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 68px;
      height: 2px;
      background: #d0d0d0;
    }

    .footer {
      position: absolute;
      left: 72px;
      bottom: 26px;
      font-size: 23px;
      font-weight: 700;
      color: #6d6d6d;
    }
  </style>
</head>
<body>
  <div class="brand">
    <img src="logo.svg" alt="">
    <h1>humane.directory</h1>
  </div>

  <p>A curated list of personal websites that are:</p>

  <ul>
    <li>text-oriented</li>
    <li>updated regularly</li>
    <li>published with RSS/Atom feeds</li>
    <li>written by thoughtful human beings</li>
  </ul>

  <div class="rule"></div>
  <div class="footer">humane.directory</div>
</body>
</html>
