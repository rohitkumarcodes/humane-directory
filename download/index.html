<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download - humane.directory</title>
  <meta name="description" content="Download humane.directory feeds as an OPML file.">
  <link rel="canonical" href="https://humane.directory/download/">
  <meta property="og:title" content="Download - humane.directory">
  <meta property="og:description" content="Download humane.directory feeds as an OPML file.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="humane.directory">
  <meta property="og:locale" content="en_US">
  <meta property="og:url" content="https://humane.directory/download/">
  <meta property="og:image" content="https://humane.directory/new-og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="The humane.directory logo, title, and the site's opening bullet list.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Download - humane.directory">
  <meta name="twitter:description" content="Download humane.directory feeds as an OPML file.">
  <meta name="twitter:image" content="https://humane.directory/new-og-image.png">
  <meta name="twitter:image:alt" content="The humane.directory logo, title, and the site's opening bullet list.">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <header class="page-header">
    <div class="page-header-copy">
      <h1><a class="site-logo" href="../index.html"><img class="site-logo-mark" src="../logo.svg" alt="" width="56" height="42">humane.directory</a></h1>
    </div>
    <nav class="site-nav" aria-label="Primary">
      <ul class="site-nav-list">
        <li><a href="../about.html">/about</a></li>
        <li><a href="./" aria-current="page">/download</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="download-intro">
      <h2>Download feeds in OPML format</h2>
    </section>

    <form class="download-form" id="download-form">
      <fieldset class="download-fieldset download-filter-sticky">
        <legend>Filters:</legend>

        <div class="download-filter-controls">
          <label class="folder-option" for="select-all">
            <input type="checkbox" id="select-all" checked>
            <span>All folders</span>
          </label>

          <div class="folder-options" id="folder-options"></div>
        </div>
      </fieldset>

      <fieldset class="download-fieldset">
        <legend>Choose individual feeds:</legend>

        <label class="feed-option" for="select-visible-feeds">
          <input type="checkbox" id="select-visible-feeds" checked>
          <span>All visible feeds</span>
        </label>

        <div class="feed-options" id="feed-options"></div>
      </fieldset>

      <button class="download-button" id="download-button" type="submit" disabled>Download OPML</button>
      <p class="download-status" id="download-status" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const selectAllCheckbox = document.getElementById('select-all');
    const selectVisibleFeedsCheckbox = document.getElementById('select-visible-feeds');
    const folderOptions = document.getElementById('folder-options');
    const feedOptions = document.getElementById('feed-options');
    const status = document.getElementById('download-status');
    const downloadForm = document.getElementById('download-form');
    const downloadButton = document.getElementById('download-button');

    let feedCatalog = [];
    let folders = [];
    let selectedFolders = new Set();
    let visibleFeedIds = new Set();
    let selectedFeedIds = new Set();

    function escapeXml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&apos;');
    }

    function slugify(value) {
      return String(value)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function getDomain(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, '');
      } catch (error) {
        return '';
      }
    }

    function createFilename(selectedFeedCount) {
      if (selectedFeedCount === feedCatalog.length) {
        return 'humane-directory-feeds.opml';
      }

      if (!selectedFeedCount) {
        return 'humane-directory-selected-feeds.opml';
      }

      return `humane-directory-selected-${selectedFeedCount}-feeds.opml`;
    }

    function setStatus(message, tone) {
      status.textContent = message;
      status.className = 'download-status';

      if (tone) {
        status.classList.add(`is-${tone}`);
      }
    }

    function getVisibleFeeds() {
      return feedCatalog.filter((feed) => visibleFeedIds.has(feed.id));
    }

    function getSelectedFeeds() {
      return feedCatalog.filter((feed) => selectedFeedIds.has(feed.id));
    }

    function updateSummary() {
      const selectedFeedCount = selectedFeedIds.size;

      downloadButton.disabled = selectedFeedCount === 0;
    }

    function renderFolderOptions() {
      folderOptions.innerHTML = '';

      folders.forEach((folder) => {
        const label = document.createElement('label');
        label.className = 'folder-option';
        label.htmlFor = `folder-${slugify(folder.tag)}`;

        const input = document.createElement('input');
        input.type = 'checkbox';
        input.id = `folder-${slugify(folder.tag)}`;
        input.dataset.folderTag = folder.tag;
        input.checked = selectedFolders.has(folder.tag);

        const text = document.createElement('span');
        text.textContent = folder.tag;

        const count = document.createElement('span');
        count.className = 'folder-option-count';
        count.textContent = `(${folder.feedIds.length})`;

        label.appendChild(input);
        label.appendChild(text);
        label.appendChild(count);
        folderOptions.appendChild(label);
      });
    }

    function renderFeedOptions() {
      feedOptions.innerHTML = '';

      const visibleFeeds = getVisibleFeeds();

      if (!visibleFeeds.length) {
        const emptyState = document.createElement('p');
        emptyState.className = 'download-empty-state';
        emptyState.textContent = 'No feeds match the selected folders.';
        feedOptions.appendChild(emptyState);
        return;
      }

      visibleFeeds.forEach((feed) => {
        const label = document.createElement('label');
        label.className = 'feed-option';
        label.htmlFor = `feed-${slugify(feed.name)}-${slugify(feed.id)}`;

        const input = document.createElement('input');
        input.type = 'checkbox';
        input.id = `feed-${slugify(feed.name)}-${slugify(feed.id)}`;
        input.dataset.feedId = feed.id;
        input.checked = selectedFeedIds.has(feed.id);

        const copy = document.createElement('span');
        copy.className = 'feed-option-copy';

        const name = document.createElement('span');
        name.className = 'feed-option-name';
        name.textContent = feed.name;

        const meta = document.createElement('span');
        meta.className = 'feed-option-meta';
        meta.textContent = feed.domain;

        copy.appendChild(name);

        if (meta.textContent) {
          copy.appendChild(meta);
        }

        label.appendChild(input);
        label.appendChild(copy);
        feedOptions.appendChild(label);
      });
    }

    function syncFolderUi() {
      const allFoldersAreSelected = selectedFolders.size === folders.length && folders.length > 0;
      const someFoldersAreSelected = selectedFolders.size > 0 && selectedFolders.size < folders.length;

      selectAllCheckbox.checked = allFoldersAreSelected;
      selectAllCheckbox.indeterminate = someFoldersAreSelected;

      document.querySelectorAll('[data-folder-tag]').forEach((checkbox) => {
        const isSelected = selectedFolders.has(checkbox.dataset.folderTag);
        checkbox.checked = isSelected;
      });
    }

    function syncFeedUi() {
      const visibleFeeds = getVisibleFeeds();
      const selectedVisibleFeedCount = visibleFeeds.filter((feed) => selectedFeedIds.has(feed.id)).length;

      selectVisibleFeedsCheckbox.disabled = visibleFeeds.length === 0;
      selectVisibleFeedsCheckbox.checked = visibleFeeds.length > 0 && selectedVisibleFeedCount === visibleFeeds.length;
      selectVisibleFeedsCheckbox.indeterminate = selectedVisibleFeedCount > 0 && selectedVisibleFeedCount < visibleFeeds.length;

      document.querySelectorAll('[data-feed-id]').forEach((checkbox) => {
        checkbox.checked = selectedFeedIds.has(checkbox.dataset.feedId);
      });

      updateSummary();
    }

    function updateVisibleFeeds(previousVisibleFeedIds = new Set()) {
      const nextVisibleFeedIds = new Set();

      folders.forEach((folder) => {
        if (!selectedFolders.has(folder.tag)) {
          return;
        }

        folder.feedIds.forEach((feedId) => nextVisibleFeedIds.add(feedId));
      });

      const nextSelectedFeedIds = new Set();

      nextVisibleFeedIds.forEach((feedId) => {
        if (selectedFeedIds.has(feedId) || !previousVisibleFeedIds.has(feedId)) {
          nextSelectedFeedIds.add(feedId);
        }
      });

      visibleFeedIds = nextVisibleFeedIds;
      selectedFeedIds = nextSelectedFeedIds;

      renderFeedOptions();
      syncFolderUi();
      syncFeedUi();
    }

    function handleSelectAllChange() {
      const previousVisibleFeedIds = new Set(visibleFeedIds);
      
      if (selectAllCheckbox.checked) {
        selectedFolders = new Set(folders.map((folder) => folder.tag));
      } else {
        selectedFolders = new Set();
      }

      setStatus('', '');
      updateVisibleFeeds(previousVisibleFeedIds);
    }

    function handleFolderSelectionChange(event) {
      const tag = event.target.dataset.folderTag;

      if (!tag) {
        return;
      }

      const previousVisibleFeedIds = new Set(visibleFeedIds);

      if (event.target.checked) {
        selectedFolders.add(tag);
      } else {
        selectedFolders.delete(tag);
      }

      setStatus('', '');
      updateVisibleFeeds(previousVisibleFeedIds);
    }

    function handleSelectVisibleFeedsChange() {
      if (selectVisibleFeedsCheckbox.checked) {
        visibleFeedIds.forEach((feedId) => selectedFeedIds.add(feedId));
      } else {
        visibleFeedIds.forEach((feedId) => selectedFeedIds.delete(feedId));
      }

      setStatus('', '');
      syncFeedUi();
    }

    function handleFeedSelectionChange(event) {
      const feedId = event.target.dataset.feedId;

      if (!feedId) {
        return;
      }

      if (event.target.checked) {
        selectedFeedIds.add(feedId);
      } else {
        selectedFeedIds.delete(feedId);
      }

      setStatus('', '');
      syncFeedUi();
    }

    function buildOpml(selectedFeedData) {
      const title = 'humane.directory export';
      const feedXml = selectedFeedData.map((feed) => (
        `  <outline text="${escapeXml(feed.name)}" title="${escapeXml(feed.name)}" type="rss" xmlUrl="${escapeXml(feed.feed)}" htmlUrl="${escapeXml(feed.url)}" />`
      )).join('\n');

      return [
        '<?xml version="1.0" encoding="UTF-8"?>',
        '<opml version="1.0">',
        '  <head>',
        `    <title>${escapeXml(title)}</title>`,
        '  </head>',
        '  <body>',
        feedXml,
        '  </body>',
        '</opml>'
      ].join('\n');
    }

    function downloadOpmlFile(opmlContent, filename) {
      const blob = new Blob([opmlContent], { type: 'text/x-opml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');

      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function createFeedCatalog(websites) {
      const feedMap = new Map();

      websites.forEach((site) => {
        if (!site.feed) {
          return;
        }

        const tags = Array.isArray(site.tags) ? site.tags.filter(Boolean) : [];

        if (!feedMap.has(site.feed)) {
          feedMap.set(site.feed, {
            id: site.feed,
            name: site.name || site.feed,
            feed: site.feed,
            url: site.url || site.feed,
            tags: new Set(tags)
          });
          return;
        }

        const existingFeed = feedMap.get(site.feed);

        tags.forEach((tag) => existingFeed.tags.add(tag));

        if (!existingFeed.url && site.url) {
          existingFeed.url = site.url;
        }

        if (!existingFeed.name && site.name) {
          existingFeed.name = site.name;
        }
      });

      return Array.from(feedMap.values())
        .map((feed) => ({
          id: feed.id,
          name: feed.name,
          feed: feed.feed,
          url: feed.url,
          tags: Array.from(feed.tags).sort((leftTag, rightTag) => leftTag.localeCompare(rightTag)),
          domain: getDomain(feed.url)
        }))
        .sort((leftFeed, rightFeed) => leftFeed.name.localeCompare(rightFeed.name));
    }

    function createFolderData(feeds) {
      const folderMap = new Map();

      feeds.forEach((feed) => {
        feed.tags.forEach((tag) => {
          if (!folderMap.has(tag)) {
            folderMap.set(tag, new Set());
          }

          folderMap.get(tag).add(feed.id);
        });
      });

      return Array.from(folderMap.entries())
        .sort(([leftTag], [rightTag]) => leftTag.localeCompare(rightTag))
        .map(([tag, feedIds]) => ({
          tag,
          feedIds: Array.from(feedIds)
        }));
    }

    async function loadDirectory() {
      setStatus('Loading feed list…', '');

      try {
        const response = await fetch('../data.json');

        if (!response.ok) {
          throw new Error('Network response was not ok');
        }

        const websites = await response.json();

        feedCatalog = createFeedCatalog(websites);
        folders = createFolderData(feedCatalog);
        selectedFolders = new Set(folders.map((folder) => folder.tag));
        selectedFeedIds = new Set();
        visibleFeedIds = new Set();

        renderFolderOptions();
        updateVisibleFeeds();
        setStatus('', '');
      } catch (error) {
        console.error('Failed to load directory data:', error);
        feedOptions.innerHTML = '<p class="download-empty-state">Could not load the feed list.</p>';
        selectVisibleFeedsCheckbox.disabled = true;
        downloadButton.disabled = true;
        setStatus('Error: Could not load the directory data. If you are viewing this locally, run a local web server first.', 'error');
      }
    }

    selectAllCheckbox.addEventListener('change', handleSelectAllChange);
    folderOptions.addEventListener('change', handleFolderSelectionChange);
    selectVisibleFeedsCheckbox.addEventListener('change', handleSelectVisibleFeedsChange);
    feedOptions.addEventListener('change', handleFeedSelectionChange);

    downloadForm.addEventListener('submit', (event) => {
      event.preventDefault();

      const selectedFeeds = getSelectedFeeds();

      if (!selectedFeeds.length) {
        setStatus('Select at least one feed before downloading.', 'error');
        return;
      }

      const opmlContent = buildOpml(selectedFeeds);
      const filename = createFilename(selectedFeeds.length);

      downloadOpmlFile(opmlContent, filename);
      setStatus(`Downloaded ${filename} with ${selectedFeeds.length} feed${selectedFeeds.length === 1 ? '' : 's'}.`, 'success');
    });

    loadDirectory();
  </script>
</body>
</html>
